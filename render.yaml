services:
  - type: web
    name: lfms_backend
    env: python
    region: singapore
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn lfms_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: findify-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://findify-keybeen.vercel.app
      - key: RENDER_EXTERNAL_HOSTNAME
        value: https://lfms-backend.onrender.com